<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Brief Generator · Studio Lou</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fdfaf5;
      color: #433E3C;
      padding: 40px 24px 80px;
    }
    select { appearance: none; -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const PLATFORMS = ["Instagram", "Pinterest", "LinkedIn", "TikTok", "Houzz"];

    const BLOCK_META = [
      { key: "platform_cadence", label: "Platform + posting cadence", icon: "📅" },
      { key: "caption_hooks", label: "Caption angles + hook ideas", icon: "💬" },
      { key: "content_types", label: "Content types + formats", icon: "🗂" },
      { key: "seo_keywords", label: "SEO, keywords + hashtags", icon: "🔍" },
      { key: "visual_direction", label: "Visual direction notes", icon: "🖼" },
    ];

    const FIRM_PLATFORM_DEFAULTS = {
      residential: ["Instagram", "Pinterest"],
      hospitality: ["LinkedIn", "Houzz", "Instagram"],
      commercial: ["LinkedIn", "Houzz"],
      "": [],
    };

    const inputStyle = {
      fontSize: 16, padding: "12px 16px", borderRadius: 12,
      border: "1px solid #d0c9bc", background: "#ffffff",
      color: "#433E3C", width: "100%",
      fontFamily: "DM Sans, sans-serif",
      outline: "none"
    };

    const labelStyle = {
      fontSize: 12, fontWeight: 600, color: "#6b6560",
      textTransform: "uppercase", letterSpacing: "0.08em",
      fontFamily: "DM Sans, sans-serif", display: "block", marginBottom: 6
    };

    function App() {
      const [topic, setTopic] = useState("");
      const [firmType, setFirmType] = useState("");
      const [projectType, setProjectType] = useState("");
      const [idealClient, setIdealClient] = useState("");
      const [designStyle, setDesignStyle] = useState("");
      const [selectedPlatforms, setSelectedPlatforms] = useState([]);
      const [loading, setLoading] = useState(false);
      const [brief, setBrief] = useState(null);
      const [error, setError] = useState("");
      const [copied, setCopied] = useState(false);

      function handleFirmTypeChange(val) {
        setFirmType(val);
        setSelectedPlatforms(FIRM_PLATFORM_DEFAULTS[val] || []);
      }

      function togglePlatform(p) {
        setSelectedPlatforms(prev =>
          prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]
        );
      }

      function downloadPDF() {
        if (!brief) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "pt", format: "letter" });
        const pageW = doc.internal.pageSize.getWidth();
        const margin = 48;
        const contentW = pageW - margin * 2;
        let y = 0;

        doc.setFillColor(215, 232, 188);
        doc.rect(0, 0, pageW, 64, "F");
        doc.setFillColor(88, 43, 54);
        doc.rect(0, 64, pageW, 3, "F");
        doc.setFillColor(88, 43, 54);
        doc.roundedRect(margin, 14, 36, 36, 4, 4, "F");
        doc.setTextColor(215, 232, 188);
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("SL", margin + 18, 37, { align: "center" });
        doc.setTextColor(88, 43, 54);
        doc.setFontSize(16);
        doc.text("Content Brief", margin + 48, 30);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 80, 80);
        doc.text("Studio Lou · for interior design firms", margin + 48, 46);
        doc.setFontSize(9);
        doc.setTextColor(140, 120, 120);
        doc.text(new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }), pageW - margin, 46, { align: "right" });

        y = 90;
        doc.setFillColor(245, 242, 238);
        doc.roundedRect(margin, y, contentW, 36, 4, 4, "F");
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(88, 43, 54);
        const metaItems = [
          firmType ? `Firm type: ${firmType}` : null,
          topic ? `Topic: ${topic}` : null,
          designStyle ? `Style: ${designStyle}` : null,
          selectedPlatforms.length ? `Platforms: ${selectedPlatforms.join(", ")}` : null,
        ].filter(Boolean);
        doc.text(metaItems.join("   ·   "), margin + 12, y + 22);
        y += 52;

        BLOCK_META.forEach(({ key, label }) => {
          if (!brief[key]) return;
          if (y > 680) { doc.addPage(); y = margin; }
          doc.setFillColor(88, 43, 54);
          doc.roundedRect(margin, y, contentW, 22, 3, 3, "F");
          doc.setFontSize(9);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(215, 232, 188);
          doc.text(label.toUpperCase(), margin + 10, y + 14);
          y += 28;
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(40, 30, 30);
          const lines = doc.splitTextToSize(brief[key], contentW - 8);
          lines.forEach(line => {
            if (y > 720) { doc.addPage(); y = margin; }
            doc.text(line, margin + 4, y);
            y += 14;
          });
          y += 16;
        });

        doc.setFillColor(215, 232, 188);
        doc.rect(0, doc.internal.pageSize.getHeight() - 28, pageW, 28, "F");
        doc.setFontSize(8);
        doc.setTextColor(88, 43, 54);
        doc.setFont("helvetica", "normal");
        doc.text("Generated by Studio Lou · studiolouinteriors.com", pageW / 2, doc.internal.pageSize.getHeight() - 10, { align: "center" });
        doc.save(`studio-lou-content-brief-${Date.now()}.pdf`);
      }

      async function generate() {
        if (!topic.trim()) { setError("Please enter a content topic or project focus."); return; }
        if (!firmType) { setError("Please select a firm type."); return; }

        setError("");
        setBrief(null);
        setLoading(true);

        const platformList = selectedPlatforms.length ? selectedPlatforms.join(", ") : "Instagram, Pinterest";

        const platformGuidance = {
          residential: `- Instagram: primary portfolio channel. Post 3-4x/week. Project reveals, before/afters, process shots, Reels for reach. Include location + style keywords in captions. Max 5 hashtags.\n- Pinterest: primary discovery channel. Post 5-10x/week. SEO-first titles and descriptions. Boards by room type and aesthetic.\n- LinkedIn: credibility layer. Post 1-2x/week. Professional case studies.\n- TikTok: cold reach. 2-3x/week. Before/after reveals, process time-lapses. Casual tone.\n- Houzz: discovery for renovation clients. Keep portfolio updated by room and style.`,
          hospitality: `- LinkedIn: PRIMARY channel. Developers, hotel groups, operators, architects. Post 3x/week. Case study format.\n- Houzz: PRIMARY for project discovery. Portfolio by project type and sector.\n- Instagram: secondary. 2-3x/week. High-production imagery. Max 5 hashtags.\n- Pinterest: ambient discovery. Keyword-rich descriptions linking to portfolio.`,
          commercial: `- LinkedIn: PRIMARY channel. Developers, property managers, corporate real estate. Post 3x/week. Case studies, thought leadership.\n- Houzz: project discovery by commercial sector.\n- Instagram: secondary. 2-3x/week. Process and completed project imagery.`,
        };

        const system = `You are an expert content strategist specializing in marketing for interior design firms. You understand the distinct difference between residential, hospitality, and commercial interior design businesses.

KEY PRINCIPLES:
- Residential firms market to homeowners: visual storytelling, before/afters, process documentation, and aspirational content drive inquiries.
- Hospitality and commercial firms market to developers, operators, and architects: case studies, outcomes, and professional credibility matter most.
- Content should be project-based and specific, not generic tips.
- Instagram now functions as a search engine -- location and style keywords in captions matter.
- Pinterest is SEO-first, boards organized by room type and aesthetic.
- Houzz is critical for project-based discovery.

PLATFORM GUIDANCE:
${platformGuidance[firmType] || ""}

CONTENT TYPES THAT BUILD TRUST:
1. Process documentation -- material selections, site visits, work in progress
2. Before/after reveals -- highest engagement, most shareable
3. Material and finish flat lays -- aspirational, saveable
4. Project case studies -- scope, constraints, outcome
5. Behind-the-scenes -- sourcing trips, studio days, client presentations
6. Local and lifestyle context -- neighborhood guides, vendor spotlights

Respond with ONLY a raw JSON object, no markdown, no explanation:
{"platform_cadence":"...","caption_hooks":"...","content_types":"...","seo_keywords":"...","visual_direction":"..."}

For seo_keywords: include primary keyword, 4-6 secondary keywords, Pinterest keyword clusters (phrase-based, no #), and platform-specific hashtag sets. Instagram max 5 hashtags. LinkedIn 3-5 professional hashtags. TikTok 3-5 hashtags. Houzz and Pinterest use keywords only, no hashtags. Only include hashtags for platforms the user selected.`;

        try {
          const res = await fetch("https://studio-lou-rag.onrender.com/api/claude", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              system,
              max_tokens: 2000,
              messages: [{
                role: "user",
                content: `Generate a content brief for this interior design firm:\n\nFirm type: ${firmType}\nContent topic / focus: ${topic}\nProject type: ${projectType || "not specified"}\nIdeal client: ${idealClient || "not specified"}\nDesign style: ${designStyle || "not specified"}\nPlatforms: ${platformList}\n\nBe specific and actionable, tailored to how ${firmType} design firms win clients through content.`
              }]
            })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data?.error?.message || "API error " + res.status);
          const raw = data.content?.[0]?.text || "";
          const clean = raw.replace(/```json|```/g, "").trim();
          setBrief(JSON.parse(clean));
        } catch (e) {
          setError("Error: " + e.message);
        } finally {
          setLoading(false);
        }
      }

      function copyAll() {
        if (!brief) return;
        const text = BLOCK_META.filter(m => brief[m.key]).map(m => `${m.label}\n${brief[m.key]}`).join("\n\n");
        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      return (
        <div style={{ maxWidth: 720, margin: "0 auto" }}>

          {/* Firm type */}
          <div style={{ marginBottom: 16 }}>
            <label style={labelStyle}>Firm type</label>
            <div style={{ position: "relative" }}>
              <select value={firmType} onChange={e => handleFirmTypeChange(e.target.value)} style={{ ...inputStyle, paddingRight: 36 }}>
                <option value="">Select firm type</option>
                <option value="residential">Residential design firm</option>
                <option value="hospitality">Hospitality design firm</option>
                <option value="commercial">Commercial / workplace design firm</option>
              </select>
              <div style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#6b6560" }}>▾</div>
            </div>
          </div>

          {/* Topic */}
          <div style={{ marginBottom: 16 }}>
            <label style={labelStyle}>Content topic / focus</label>
            <input value={topic} onChange={e => setTopic(e.target.value)}
              placeholder="e.g. master suite reveal, sourcing trip to High Point, boutique hotel lobby project"
              style={inputStyle} />
          </div>

          {/* Grid */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <div>
              <label style={labelStyle}>Project type</label>
              <input value={projectType} onChange={e => setProjectType(e.target.value)}
                placeholder="e.g. full home renovation, hotel lobby"
                style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>Design style</label>
              <input value={designStyle} onChange={e => setDesignStyle(e.target.value)}
                placeholder="e.g. modern organic, coastal, transitional"
                style={inputStyle} />
            </div>
          </div>

          {/* Ideal client */}
          <div style={{ marginBottom: 16 }}>
            <label style={labelStyle}>Ideal client</label>
            <input value={idealClient} onChange={e => setIdealClient(e.target.value)}
              placeholder="e.g. high-end homeowners in Austin, boutique hotel developers"
              style={inputStyle} />
          </div>

          {/* Platforms */}
          <div style={{ marginBottom: 24 }}>
            <label style={labelStyle}>
              Platforms{firmType ? " · recommended pre-selected for your firm type" : ""}
            </label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {PLATFORMS.map(p => (
                <div key={p} onClick={() => togglePlatform(p)} style={{
                  fontSize: 15, padding: "8px 18px",
                  border: "1px solid #d0c9bc", borderRadius: 50,
                  cursor: "pointer",
                  background: selectedPlatforms.includes(p) ? "#582b36" : "#ffffff",
                  color: selectedPlatforms.includes(p) ? "#e7dbbf" : "#433E3C",
                  userSelect: "none", transition: "all 0.15s",
                  fontFamily: "DM Sans, sans-serif"
                }}>{p}</div>
              ))}
            </div>
          </div>

          {/* Generate button */}
          <button onClick={generate} disabled={loading} style={{
            padding: "14px 36px", background: "#A6BE47", color: "#ffffff",
            border: "none", borderRadius: 50, fontSize: 16, fontWeight: 600,
            cursor: loading ? "not-allowed" : "pointer",
            opacity: loading ? 0.7 : 1,
            fontFamily: "DM Sans, sans-serif"
          }}>
            {loading ? "Generating your brief..." : "✦ Generate brief"}
          </button>

          {/* Error */}
          {error && (
            <div style={{ marginTop: 16, padding: "12px 16px", background: "#fdecea", color: "#c0392b", borderRadius: 10, fontSize: 15, fontFamily: "DM Sans, sans-serif" }}>
              {error}
            </div>
          )}

          {/* Output */}
          {brief && (
            <div style={{ marginTop: 40, paddingTop: 32, borderTop: "1px solid #e8e0d5" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                <h2 style={{ fontSize: 20, fontWeight: 600, color: "#433E3C", fontFamily: "DM Sans, sans-serif" }}>Content brief</h2>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={copyAll} style={{
                    fontSize: 14, color: "#433E3C", background: "none",
                    border: "1px solid #d0c9bc", borderRadius: 50,
                    padding: "6px 16px", cursor: "pointer", fontFamily: "DM Sans, sans-serif"
                  }}>
                    {copied ? "✓ Copied" : "Copy all"}
                  </button>
                  <button onClick={downloadPDF} style={{
                    fontSize: 14, color: "#ffffff", background: "#A6BE47",
                    border: "none", borderRadius: 50,
                    padding: "6px 16px", cursor: "pointer", fontFamily: "DM Sans, sans-serif", fontWeight: 600
                  }}>
                    ↓ Download PDF
                  </button>
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {BLOCK_META.filter(m => brief[m.key]).map(m => (
                  <div key={m.key} style={{
                    background: "#f5f0e8", border: "1px solid #e8e0d5",
                    borderRadius: 14, padding: "18px 20px"
                  }}>
                    <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "#582b36", marginBottom: 10, fontFamily: "DM Sans, sans-serif" }}>
                      {m.icon} {m.label}
                    </div>
                    <div style={{ fontSize: 15, lineHeight: 1.75, whiteSpace: "pre-wrap", color: "#433E3C", fontFamily: "DM Sans, sans-serif" }}>
                      {brief[m.key]}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
