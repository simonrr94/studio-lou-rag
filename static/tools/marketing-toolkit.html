<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Toolkit · Studio Lou</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: auto; }
    body { font-family: 'DM Sans', sans-serif; background: #FAF9F6; }

    .tab-bar {
      background: #FAF9F6;
      padding: 24px 24px 0;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      position: relative;
    }
    .tab-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #A6BE47;
      z-index: 2;
    }

    /* Wrapper holds the drop-shadow so it applies to the clipped shape */
    .tab-wrap {
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      filter: drop-shadow(-6px 0 5px rgba(0,0,0,0.18)) drop-shadow(6px 0 5px rgba(0,0,0,0.18));
    }
    .tab-wrap.is-active { z-index: 3; }

    .tab-btn {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #6b6560;
      background: #ffffff;
      border: none;
      padding: 12px 36px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      /* clip-path set dynamically by JS for rounded trapezoid */
    }
    .tab-btn span { display: inline-block; }
    .tab-btn.active {
      background: #A6BE47;
      color: #fff;
    }
    .tab-btn:hover:not(.active) { color: #433E3C; }

    #toolFrame {
      width: 100%;
      border: none;
      display: block;
      min-height: 800px;
      transition: height 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="tab-bar" id="tabBar">
    <div class="tab-wrap is-active">
      <button class="tab-btn active" onclick="loadTool(this,'marketing-audit')"><span>Marketing Audit</span></button>
    </div>
    <div class="tab-wrap">
      <button class="tab-btn" onclick="loadTool(this,'bio-generator')"><span>Platform Bio Generator</span></button>
    </div>
    <div class="tab-wrap">
      <button class="tab-btn" onclick="loadTool(this,'content-brief')"><span>Content Brief Generator</span></button>
    </div>
    <div class="tab-wrap">
      <button class="tab-btn" onclick="loadTool(this,'hashtag-research')"><span>Hashtag + Keyword Research</span></button>
    </div>
  </div>
  <iframe id="toolFrame" src="https://studio-lou-rag.onrender.com/tools/marketing-audit" scrolling="no"></iframe>

  <script>
    var frame = document.getElementById('toolFrame');
    var tabBar = document.getElementById('tabBar');
    var lastH = 0;
    var BASE = 'https://studio-lou-rag.onrender.com/tools/';

    function loadTool(btn, name) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-wrap').forEach(function(w) { w.classList.remove('is-active'); });
      btn.classList.add('active');
      btn.closest('.tab-wrap').classList.add('is-active');
      frame.style.height = '800px';
      lastH = 0;
      frame.src = BASE + name;
    }

    // Build a rounded trapezoid SVG path for each tab button.
    // Shape: wider at bottom (left side angles 2-o'clock, right side angles 10-o'clock).
    // Corners rounded at top-left and top-right with radius r.
    function trapPath(w, h, inset, r) {
      // Left side unit vector (from bottom-left up to top-left corner)
      var L = Math.sqrt(inset * inset + h * h);
      var ux = inset / L, uy = h / L;

      // Point on left side, r-distance before top-left corner (inset, 0)
      var tlx0 = inset - ux * r, tly0 = uy * r;
      // Point on top edge, r-distance after top-left corner
      var tlx1 = inset + r, tly1 = 0;

      // Point on top edge, r-distance before top-right corner (w-inset, 0)
      var trx0 = (w - inset) - r, try0 = 0;
      // Point on right side, r-distance after top-right corner
      var trx1 = (w - inset) + ux * r, try1 = uy * r;

      return [
        'M', f(tlx0), f(tly0),
        'Q', inset, 0, f(tlx1), f(tly1),
        'L', f(trx0), f(try0),
        'Q', (w - inset), 0, f(trx1), f(try1),
        'L', w, h,
        'L', 0, h,
        'Z'
      ].join(' ');
    }

    function f(n) { return n.toFixed(2); }

    function updateTabPaths() {
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        var w = btn.offsetWidth;
        var h = btn.offsetHeight;
        if (w > 0 && h > 0) {
          btn.style.clipPath = 'path("' + trapPath(w, h, 18, 12) + '")';
        }
      });
    }

    // Run after layout and on resize
    setTimeout(updateTabPaths, 60);
    window.addEventListener('resize', updateTabPaths);

    function syncHeight() {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        var h = Math.max(
          doc.body.scrollHeight,
          doc.documentElement.scrollHeight
        );
        if (h > 100 && h !== lastH) {
          lastH = h;
          frame.style.height = h + 'px';
          var total = h + tabBar.offsetHeight + 4;
          window.parent.postMessage({ height: total }, '*');
        }
      } catch(e) {}
    }

    setInterval(syncHeight, 300);
  </script>
</body>
</html>
